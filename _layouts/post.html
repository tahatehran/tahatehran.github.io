---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta" style="color: var(--muted); margin-bottom: 2rem;">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.author %} • {{ page.author }}{% endif %}
    </div>
  </header>

  <div class="post-content card" style="line-height: 1.8;">
    {{ content }}
  </div>

  <div class="post-footer" style="margin-top: 2rem;">
    <a href="{{ '/blog/' | relative_url }}" class="btn" style="border: 1px solid var(--border); color: var(--text);">
      <i class="fas fa-arrow-right"></i> بازگشت به بلاگ
    </a>
  </div>
</article>
