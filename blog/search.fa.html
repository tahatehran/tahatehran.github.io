---
layout: default
title: "جستجو در بلاگ -MovtiGroup"
permalink: /fa/blog/search/
lang: fa
locale: fa
dir: rtl
---

<div class="blog-header">
  <h1>جستجو در بلاگ</h1>
  <p>جستجو در میان {{ site.posts | size }} پست</p>
</div>

<div class="search-container">
  <input 
    type="search" 
    id="blog-search" 
    placeholder="جستجو..." 
    autocomplete="off"
    aria-label="جستجو در بلاگ"
  >
  <div id="search-results" class="search-results">
    <div class="search-info">برای جستجو تایپ کنید...</div>
  </div>
</div>

<script>
(function() {
  const searchInput = document.getElementById('blog-search');
  const resultsContainer = document.getElementById('search-results');
  
  const posts = [];
  
  fetch('/blog/search-data.json')
    .then(r => r.json())
    .then(data => {
      window.searchPosts = data.posts || [];
      renderSearchResults(window.searchPosts);
    })
    .catch(() => {
      resultsContainer.innerHTML = '<div class="search-info">در حال بارگذاری...</div>';
    });
  
  function renderSearchResults(postsToShow) {
    if (!postsToShow.length) {
      resultsContainer.innerHTML = '<div class="search-info">نتیجه‌ای یافت نشد</div>';
      return;
    }
    
    const html = postsToShow.map(post => `
      <article class="blog-post-card search-result-card" data-title="${escapeHtml(post.title)}" data-description="${escapeHtml(post.description || '')}">
        <div class="post-card-content">
          <h2 class="post-card-title">
            <a href="${post.url}">${escapeHtml(post.title)}</a>
          </h2>
          <p class="post-card-excerpt">${escapeHtml(post.description || '')}</p>
          <div class="post-card-meta">
            ${post.categories ? post.categories.map(c => `<span class="category-tag">${escapeHtml(c)}</span>`).join('') : ''}
          </div>
        </div>
      </article>
    `).join('');
    
    const infoText = document.documentElement.dir === 'rtl' 
      ? `${postsToShow.length} نتیجه`
      : `${postsToShow.length} results`;
    resultsContainer.innerHTML = `<div class="search-info">${infoText}</div>` + html;
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      
      if (!query) {
        renderSearchResults(window.searchPosts || []);
        return;
      }
      
      const filtered = (window.searchPosts || []).filter(post => {
        const title = (post.title || '').toLowerCase();
        const desc = (post.description || '').toLowerCase();
        const cats = (post.categories || []).join(' ').toLowerCase();
        return title.includes(query) || desc.includes(query) || cats.includes(query);
      });
      
      renderSearchResults(filtered);
    });
  }
})();
</script>
